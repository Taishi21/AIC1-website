<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Immersive 3D Website</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f5f7fb;
        background: #05070d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: #05070d;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: flex-end;
        pointer-events: none;
        background:
          radial-gradient(circle at 70% 35%, rgba(32, 201, 151, 0.12), transparent 32%),
          linear-gradient(90deg, rgba(5, 7, 13, 0.9), rgba(5, 7, 13, 0.24) 52%, rgba(5, 7, 13, 0.7));
      }

      .content {
        width: min(100%, 980px);
        padding: clamp(32px, 7vw, 88px);
      }

      .eyebrow {
        margin: 0 0 18px;
        color: #7df9d4;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 780px;
        margin: 0;
        font-size: clamp(2.6rem, 8vw, 6.8rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 560px;
        margin: 22px 0 0;
        color: rgba(245, 247, 251, 0.78);
        font-size: clamp(1rem, 2.4vw, 1.25rem);
        line-height: 1.8;
      }

      .status {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
        color: rgba(245, 247, 251, 0.72);
        font-size: 0.9rem;
      }

      .status span {
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(16px);
      }

      @media (max-width: 700px) {
        body {
          overflow: auto;
        }

        .overlay {
          align-items: center;
          background:
            linear-gradient(180deg, rgba(5, 7, 13, 0.4), rgba(5, 7, 13, 0.9)),
            radial-gradient(circle at 50% 30%, rgba(32, 201, 151, 0.16), transparent 44%);
        }

        .content {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-label="抽象的な3D空間"></canvas>
    <main class="overlay">
      <section class="content">
        <p class="eyebrow">Personal Website</p>
        <h1>Into the Digital Horizon</h1>
        <p>光の粒子と立体的な軌道が動き続ける、GitHub Pages向けの没入型3Dトップページです。</p>
        <div class="status" aria-label="サイトの特徴">
          <span>Realtime 3D</span>
          <span>Responsive</span>
          <span>GitHub Pages Ready</span>
        </div>
      </section>
    </main>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

      const canvas = document.querySelector("#scene");
      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x05070d, 0.035);

      const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 160);
      camera.position.set(0, 1.6, 9);

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x05070d, 1);

      const ambient = new THREE.AmbientLight(0x7aa7ff, 0.9);
      scene.add(ambient);

      const keyLight = new THREE.PointLight(0x20c997, 8, 45);
      keyLight.position.set(5, 4, 4);
      scene.add(keyLight);

      const magentaLight = new THREE.PointLight(0xff4fd8, 5, 40);
      magentaLight.position.set(-6, -2, 3);
      scene.add(magentaLight);

      const coreGeometry = new THREE.IcosahedronGeometry(2.1, 3);
      const coreMaterial = new THREE.MeshStandardMaterial({
        color: 0x93fff0,
        metalness: 0.72,
        roughness: 0.18,
        emissive: 0x0d5f73,
        emissiveIntensity: 0.38,
        wireframe: true
      });
      const core = new THREE.Mesh(coreGeometry, coreMaterial);
      core.position.set(2.8, 0.2, -1.2);
      scene.add(core);

      const ringGroup = new THREE.Group();
      scene.add(ringGroup);

      const ringMaterial = new THREE.MeshBasicMaterial({
        color: 0x7df9d4,
        transparent: true,
        opacity: 0.38
      });

      for (let i = 0; i < 5; i += 1) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(3.1 + i * 0.28, 0.008, 16, 180),
          ringMaterial.clone()
        );
        ring.rotation.x = Math.PI / 2.2 + i * 0.18;
        ring.rotation.y = i * 0.38;
        ring.material.opacity = 0.16 + i * 0.045;
        ringGroup.add(ring);
      }

      ringGroup.position.copy(core.position);

      const particleCount = 2800;
      const particlePositions = new Float32Array(particleCount * 3);
      const particleColors = new Float32Array(particleCount * 3);
      const colorA = new THREE.Color(0x7df9d4);
      const colorB = new THREE.Color(0xff4fd8);
      const colorC = new THREE.Color(0x4f8cff);

      for (let i = 0; i < particleCount; i += 1) {
        const radius = 7 + Math.random() * 55;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
        const index = i * 3;

        particlePositions[index] = Math.sin(phi) * Math.cos(theta) * radius;
        particlePositions[index + 1] = Math.cos(phi) * radius * 0.62;
        particlePositions[index + 2] = Math.sin(phi) * Math.sin(theta) * radius - 20;

        const mixed = colorA.clone().lerp(i % 3 === 0 ? colorB : colorC, Math.random() * 0.7);
        particleColors[index] = mixed.r;
        particleColors[index + 1] = mixed.g;
        particleColors[index + 2] = mixed.b;
      }

      const particleGeometry = new THREE.BufferGeometry();
      particleGeometry.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));
      particleGeometry.setAttribute("color", new THREE.BufferAttribute(particleColors, 3));

      const particles = new THREE.Points(
        particleGeometry,
        new THREE.PointsMaterial({
          size: 0.045,
          vertexColors: true,
          transparent: true,
          opacity: 0.9,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      scene.add(particles);

      const tunnel = new THREE.Mesh(
        new THREE.TorusKnotGeometry(4.7, 0.018, 360, 12, 2, 5),
        new THREE.MeshBasicMaterial({
          color: 0x4f8cff,
          transparent: true,
          opacity: 0.22
        })
      );
      tunnel.position.set(1.2, 0, -6);
      tunnel.rotation.x = 0.8;
      scene.add(tunnel);

      const pointer = new THREE.Vector2(0, 0);

      window.addEventListener("pointermove", (event) => {
        pointer.x = (event.clientX / window.innerWidth - 0.5) * 2;
        pointer.y = (event.clientY / window.innerHeight - 0.5) * 2;
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();

      function animate() {
        const elapsed = clock.getElapsedTime();

        particles.rotation.y = elapsed * 0.025;
        particles.rotation.x = Math.sin(elapsed * 0.18) * 0.08;

        core.rotation.x = elapsed * 0.32;
        core.rotation.y = elapsed * 0.46;
        core.scale.setScalar(1 + Math.sin(elapsed * 1.8) * 0.035);

        ringGroup.rotation.x = elapsed * 0.12;
        ringGroup.rotation.z = elapsed * 0.18;

        tunnel.rotation.y = elapsed * 0.18;
        tunnel.rotation.z = elapsed * 0.08;

        keyLight.position.x = Math.cos(elapsed * 0.6) * 6;
        keyLight.position.z = Math.sin(elapsed * 0.6) * 6;

        camera.position.x += (pointer.x * 1.2 - camera.position.x) * 0.035;
        camera.position.y += (-pointer.y * 0.8 + 1.6 - camera.position.y) * 0.035;
        camera.lookAt(1.1, 0, -3);

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
