<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sell | Keio TextCycle</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app page-shell">
      <header>
        <div class="topbar">
          <a class="brand" href="index.html">Keio <span class="brand-accent">TextCycle</span></a>
          <div class="nav-actions">
            <a class="ghost-button" href="index.html">TOP</a>
            <a class="primary-button" href="buy.html">BUY</a>
          </div>
        </div>
      </header>

      <main>
        <section class="page-hero sell-hero">
          <span>SELL / QUICK LISTING</span>
          <h1>Turn last term's books into cash.</h1>
        </section>

        <section class="layout view-sell" aria-label="出品ページ">
          <div class="side-stack sell-view">
            <aside class="sell-panel">
              <div class="section-title">
                <h2>List your book</h2>
                <span>1 min</span>
              </div>
              <div class="field">
                <label for="isbn">ISBN</label>
                <input id="isbn" placeholder="978-4-..." inputmode="numeric">
              </div>
              <div class="field">
                <label for="title">タイトル</label>
                <input id="title" placeholder="教科書名">
              </div>
              <div class="field">
                <label for="sell-condition">状態</label>
                <select id="sell-condition">
                  <option>ほぼ新品</option>
                  <option>書き込み少なめ</option>
                  <option>書き込みあり</option>
                </select>
              </div>
              <div class="field">
                <label for="campus">受け渡し</label>
                <select id="campus">
                  <option>日吉</option>
                  <option>三田</option>
                  <option>矢上</option>
                  <option>SFC</option>
                  <option>配送</option>
                </select>
              </div>
              <div class="field">
                <label for="sell-price">販売価格</label>
                <input id="sell-price" type="number" placeholder="2400" step="100">
              </div>
              <button class="primary-button" id="create-listing" type="button">出品を作成</button>
            </aside>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script>
      const toast = document.querySelector("#toast");
      let toastTimer;
      document.querySelector("#create-listing").addEventListener("click", () => {
        const isbn = document.querySelector("#isbn").value.trim();
        const price = document.querySelector("#sell-price").value.trim();
        toast.textContent = isbn || price ? "出品プレビューを作成しました" : "ISBNと価格を入力してください";
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
      });
    </script>
  </body>
</html>
